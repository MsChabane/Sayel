name: Backend CI/CD

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'

  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'

  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force deploy even without code changes'
        required: false
        default: false
        type: boolean
      rollback_tag:
        description: 'Docker image tag to rollback to (e.g. sha-abc1234)'
        required: false
        type: string

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO_NAME_BACKEND }}
  PYTHON_VERSION: '3.12'

jobs:

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 1 — Build & Test
  # Skipped entirely when rollback_tag is provided
  # ════════════════════════════════════════════════════════════════════════════
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    if: |
      github.event.inputs.rollback_tag == '' ||
      github.event.inputs.rollback_tag == null

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Create test environment file
        run: |
          cat > .env << 'EOF'
          SECRET_KEY=test-secret-key-for-ci-minimum-32-characters-long
          ALGORITHM=HS256
          ACCESS_TOKEN_EXPIRE_MINUTES=30
          REFRESH_TOKEN_EXPIRE_DAYS=7
          DATABASE_URL=sqlite:///./test.db
          SUPER_ADMIN_EMAIL=test@example.com
          SUPER_ADMIN_PASSWORD=TestPassword123
          GOOGLE_SHEET_ID=
          GOOGLE_SERVICE_ACCOUNT_JSON={}
          FRONTEND_URL=http://localhost:3000
          KEEP_ALIVE_ENABLED=false
          KEEP_ALIVE_URL=http://localhost:8000/health
          KEEP_ALIVE_INTERVAL=9999
          EOF

      - name: Run linting (ruff)
        run: |
          pip install ruff
          ruff check . --select=E,F,W --ignore=E501
        continue-on-error: true

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short 2>/dev/null || echo "No tests found — skipping"

      - name: Test application startup
        run: |
          uvicorn main:app --host 0.0.0.0 --port 8765 &
          SERVER_PID=$!

          echo "Waiting for server to start..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8765/health > /dev/null 2>&1; then
              echo "Server is ready after ${i}s"
              break
            fi
            sleep 1
          done

          echo "Running smoke tests..."

          HEALTH=$(curl -sf http://localhost:8765/health)
          echo "Health response: $HEALTH"

          QUESTIONS=$(curl -sf http://localhost:8765/api/questions)
          echo "Questions response: $QUESTIONS"

          LOGIN=$(curl -sf -X POST http://localhost:8765/api/admin/login \
            -H "Content-Type: application/json" \
            -d '{"email":"test@example.com","password":"TestPassword123"}')
          echo "Login response: $LOGIN"

          TOKEN=$(echo $LOGIN | python3 -c "import sys,json; print(json.load(sys.stdin).get('access_token','MISSING'))")
          if [ "$TOKEN" = "MISSING" ]; then
            echo "ERROR: Login did not return access_token"
            kill $SERVER_PID
            exit 1
          fi
          echo "Login successful — token received"

          kill $SERVER_PID
          echo "All smoke tests passed"

      - name: Clean up test database
        run: rm -f test.db intake_system.db

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 2 — Build & Push Docker Image
  # Skipped when rollback_tag is provided
  # ════════════════════════════════════════════════════════════════════════════
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test
    if: |
      (github.event.inputs.rollback_tag == '' || github.event.inputs.rollback_tag == null) &&
      github.event_name != 'pull_request' &&
      (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      image_digest: ${{ steps.push.outputs.digest }}
      sha_tag: sha-${{ github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=raw,value={{date 'YYYY-MM-DD'}}
            type=ref,event=branch,enable=${{ github.ref != 'refs/heads/main' }}
          labels: |
            org.opencontainers.image.title=Sayel Backend
            org.opencontainers.image.description=FastAPI backend for Client Intake Chat
            org.opencontainers.image.vendor=${{ github.repository_owner }}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max
          provenance: false

      - name: Print image details
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Image pushed successfully"
          echo "Tags:"
          echo "${{ steps.meta.outputs.tags }}" | tr ',' '\n' | sed 's/^/  /'
          echo "Digest: ${{ steps.push.outputs.digest }}"
          echo "SHA tag: sha-${{ github.sha }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Save image tag to artifact
        run: |
          mkdir -p /tmp/artifacts
          echo "sha-$(echo ${{ github.sha }} | cut -c1-7)" > /tmp/artifacts/backend-image-tag.txt
          echo "Image tag saved: $(cat /tmp/artifacts/backend-image-tag.txt)"

      - name: Upload image tag artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-image-tag
          path: /tmp/artifacts/backend-image-tag.txt
          retention-days: 90

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 3 — Deploy to Render
  # Skipped when rollback_tag is provided
  # ════════════════════════════════════════════════════════════════════════════
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build-and-push
    if: |
      (github.event.inputs.rollback_tag == '' || github.event.inputs.rollback_tag == null) &&
      (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')

    environment:
      name: production-backend
      url: https://api-sayel.onrender.com

    steps:
      - name: Trigger Render
        env:
          SERVICE_ID: ${{ secrets.RENDER_BACKEND_SERVICE_ID }}
          API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          SERVICE_ID=$(echo "$SERVICE_ID" | tr -d '[:space:]')

          HTTP_CODE=$(curl -s \
            -o response.json \
            -w "%{http_code}" \
            -X POST \
            "https://api.render.com/v1/services/${SERVICE_ID}/deploys" \
            -H "Authorization: Bearer $API_KEY" \
            -H "Content-Type: application/json")

          echo "HTTP: $HTTP_CODE"
          echo "Response:"
          cat response.json

          if [ "$HTTP_CODE" != "201" ]; then
            echo "❌ Failed to trigger deploy (HTTP $HTTP_CODE)"
            exit 1
          fi

          # Extract deploy ID for polling
          DEPLOY_ID=$(python3 -c "import sys,json; print(json.load(open('response.json')).get('id',''))")

          if [ -z "$DEPLOY_ID" ]; then
            echo "❌ Could not extract deploy ID from response"
            exit 1
          fi

          echo "✅ Deploy triggered — ID: $DEPLOY_ID"
          echo "DEPLOY_ID=$DEPLOY_ID" >> $GITHUB_ENV

      - name: Wait for deployment to complete
        env:
          SERVICE_ID: ${{ secrets.RENDER_BACKEND_SERVICE_ID }}
          API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          SERVICE_ID=$(echo "$SERVICE_ID" | tr -d '[:space:]')

          echo "Polling deploy ID: $DEPLOY_ID"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          MAX_WAIT=600   # 10 minutes max
          WAITED=0
          INTERVAL=15

          while [ $WAITED -lt $MAX_WAIT ]; do

            RESPONSE=$(curl -s \
              "https://api.render.com/v1/services/${SERVICE_ID}/deploys/${DEPLOY_ID}" \
              -H "Authorization: Bearer $API_KEY" \
              -H "Content-Type: application/json")

            if [ -z "$RESPONSE" ]; then
              echo "⚠️  Empty response from API — retrying in ${INTERVAL}s"
              sleep $INTERVAL
              WAITED=$((WAITED + INTERVAL))
              continue
            fi

            STATUS=$(echo "$RESPONSE" | python3 -c "
          import sys, json
          try:
            data = json.load(sys.stdin)
            print(data.get('status', 'unknown'))
          except Exception as e:
            print('parse_error')
          ")

            echo "  Status: $STATUS  (waited ${WAITED}s / ${MAX_WAIT}s)"

            case "$STATUS" in
              "live")
                echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
                echo "✅ Deployment is live!"
                exit 0
                ;;
              "deactivated")
                echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
                echo "✅ Deployment deactivated (superseded by newer deploy)"
                exit 0
                ;;
              "build_failed"|"update_failed"|"canceled")
                echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
                echo "❌ Deployment failed with status: $STATUS"
                exit 1
                ;;
              "parse_error")
                echo "⚠️  Could not parse response — retrying"
                echo "Raw response: $RESPONSE"
                ;;
              *)
                # created | build_in_progress | update_in_progress | pre_deploy_in_progress
                echo "⏳ Still in progress..."
                ;;
            esac

            sleep $INTERVAL
            WAITED=$((WAITED + INTERVAL))
          done

          echo "❌ Timed out after ${MAX_WAIT}s waiting for deployment"
          exit 1

      - name: Verify backend is accessible
        run: |
          echo "Verifying backend health endpoint is accessible..."

          for attempt in 1 2 3 4 5; do
            echo "Attempt $attempt/5..."
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              https://api-sayel.onrender.com/health 2>/dev/null || echo "000")

            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Backend is accessible (HTTP $HTTP_CODE)"
              exit 0
            fi

            echo "Got HTTP $HTTP_CODE — retrying in 5s..."
            sleep 5
          done

          echo "❌ Backend verification failed after 5 attempts"
          exit 1

      - name: Post deployment summary
        run: |
          echo "## Backend Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ✅ Success |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ env.IMAGE_NAME }}:sha-$(echo ${{ github.sha }} | cut -c1-7)\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| URL | https://api-sayel.onrender.com |" >> $GITHUB_STEP_SUMMARY
          echo "| Deployed by | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 4 — Rollback (manual trigger only, only when rollback_tag is set)
  # ════════════════════════════════════════════════════════════════════════════
  rollback:
    name: Rollback to Previous Image
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.rollback_tag != ''

    environment:
      name: production-backend
      url: https://api-sayel.onrender.com

    steps:
      - name: Validate rollback tag exists on Docker Hub
        run: |
          ROLLBACK_TAG="${{ github.event.inputs.rollback_tag }}"
          echo "Checking if tag exists: ${{ env.IMAGE_NAME }}:$ROLLBACK_TAG"

          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            "https://hub.docker.com/v2/repositories/${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO_NAME_BACKEND }}/tags/$ROLLBACK_TAG/")

          if [ "$STATUS" != "200" ]; then
            echo "ERROR: Tag '$ROLLBACK_TAG' does not exist on Docker Hub"
            echo "Available tags: https://hub.docker.com/r/${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO_NAME_BACKEND }}/tags"
            exit 1
          fi

          echo "Tag '$ROLLBACK_TAG' confirmed on Docker Hub"
          echo "ROLLBACK_TAG=$ROLLBACK_TAG" >> $GITHUB_ENV

      - name: Re-tag rollback image as latest
        run: |
          # Login first before any docker pull/push operations
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login \
            -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

          echo "Pulling rollback image..."
          docker pull ${{ env.IMAGE_NAME }}:$ROLLBACK_TAG

          echo "Tagging as latest..."
          docker tag ${{ env.IMAGE_NAME }}:$ROLLBACK_TAG ${{ env.IMAGE_NAME }}:latest

          echo "Pushing latest tag..."
          docker push ${{ env.IMAGE_NAME }}:latest
          echo "Rollback image promoted to latest"

      - name: Trigger Render redeploy with rolled-back image
        env:
          SERVICE_ID: ${{ secrets.RENDER_BACKEND_SERVICE_ID }}
          API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          SERVICE_ID=$(echo "$SERVICE_ID" | tr -d '[:space:]')

          HTTP_CODE=$(curl -s \
            -o response.json \
            -w "%{http_code}" \
            -X POST \
            "https://api.render.com/v1/services/${SERVICE_ID}/deploys" \
            -H "Authorization: Bearer $API_KEY" \
            -H "Content-Type: application/json" \
            -d '{}')

          echo "HTTP: $HTTP_CODE"
          echo "Response:"
          cat response.json

          if [ "$HTTP_CODE" != "201" ]; then
            echo "❌ Failed to trigger rollback deploy (HTTP $HTTP_CODE)"
            exit 1
          fi

          echo "✅ Rollback deploy triggered successfully"

      - name: Post rollback summary
        run: |
          echo "## ⏪ Backend Rollback Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ✅ Rollback triggered |" >> $GITHUB_STEP_SUMMARY
          echo "| Rolled back to | \`$ROLLBACK_TAG\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
