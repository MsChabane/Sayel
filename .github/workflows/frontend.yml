name: Frontend CI/CD

# ── Triggers ───────────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'

  pull_request:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'

  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force deploy even without code changes'
        required: false
        default: false
        type: boolean
      rollback_tag:
        description: 'Docker image tag to rollback to (e.g. sha-abc1234)'
        required: false
        type: string

concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO_NAME_FRONTEND }}
  NODE_VERSION: '18'

jobs:

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Create environment file
        run: |
          cat > .env.local << 'EOF'
          NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          EOF

      - name: Run TypeScript check
        run: npx tsc --noEmit

      - name: Run ESLint
        run: npm run lint
        continue-on-error: true

      - name: Build Next.js application
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_TELEMETRY_DISABLED: 1

      - name: Verify build output exists
        run: |
          if [ ! -d ".next" ]; then
            echo "ERROR: .next directory not found — build failed"
            exit 1
          fi
          if [ ! -f ".next/standalone/server.js" ]; then
            echo "ERROR: standalone server.js not found"
            echo "Make sure next.config.ts has output: 'standalone'"
            exit 1
          fi
          echo "Build output verified successfully"
          du -sh .next/




  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test

    if: |
      github.event_name != 'pull_request' &&
      (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      image_digest: ${{ steps.push.outputs.digest }}
      sha_tag: sha-${{ github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=raw,value={{date 'YYYY-MM-DD'}}
            type=ref,event=branch,enable=${{ github.ref != 'refs/heads/main' }}
          labels: |
            org.opencontainers.image.title=Sayel Frontend
            org.opencontainers.image.description=Next.js frontend for Client Intake Chat
            org.opencontainers.image.vendor=${{ github.repository_owner }}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          # Pass API URL as build argument
          build-args: |
            NEXT_PUBLIC_API_URL=${{secrets.NEXT_PUBLIC_API_URL}}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max
          provenance: false

      - name: Print image details
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Frontend image pushed successfully"
          echo "Tags:"
          echo "${{ steps.meta.outputs.tags }}" | tr ',' '\n' | sed 's/^/  /'
          echo "Digest: ${{ steps.push.outputs.digest }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"




  # ════════════════════════════════════════════════════════════════════════════
  # JOB 3 — Deploy to Render
  # ════════════════════════════════════════════════════════════════════════════
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build-and-push

    if: |
      github.ref == 'refs/heads/main' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.rollback_tag == '')

    environment:
      name: production-frontend
      url: https://app-sayel.onrender.com

    steps:
      - name: Trigger Render deploy
        run: |
          echo "Triggering Render frontend deployment..."
          RESPONSE=$(curl -sf -X POST \
            "https://api.render.com/v1/services/${{ secrets.RENDER_FRONTEND_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}')

          echo "Render API response: $RESPONSE"
          DEPLOY_ID=$(echo $RESPONSE | python3 -c "import sys,json; print(json.load(sys.stdin).get('id','unknown'))")
          echo "Deploy ID: $DEPLOY_ID"
          echo "DEPLOY_ID=$DEPLOY_ID" >> $GITHUB_ENV

      - name: Wait for deployment to complete
        run: |
          MAX_WAIT=100
          WAITED=0
          INTERVAL=5

          while [ $WAITED -lt $MAX_WAIT ]; do
            STATUS=$(curl -sf \
              "https://api.render.com/v1/services/${{ secrets.RENDER_FRONTEND_SERVICE_ID }}/deploys/$DEPLOY_ID" \
              -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" | \
              python3 -c "import sys,json; print(json.load(sys.stdin).get('status','unknown'))")

            echo "  Deploy status: $STATUS  (waited ${WAITED}s)"

            if [ "$STATUS" = "live" ]; then
              echo "Frontend deployment is live!"
              break
            fi

            if [ "$STATUS" = "deactivated" ] || [ "$STATUS" = "build_failed" ]; then
              echo "Deployment FAILED with status: $STATUS"
              exit 1
            fi

            sleep $INTERVAL
            WAITED=$((WAITED + INTERVAL))
          done

      - name: Verify frontend is accessible
        run: |
          echo "Verifying frontend is accessible..."
          sleep 5

          for attempt in 1 2 3 4 5; do
            echo "Attempt $attempt/5..."
            HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" \
              https://app-sayel.onrender.com/ 2>/dev/null || echo "000")

            if [ "$HTTP_CODE" = "200" ]; then
              echo "Frontend is accessible (HTTP $HTTP_CODE)"
              break
            fi

            echo "Got HTTP $HTTP_CODE — retrying in 5s..."

            if [ $attempt -eq 5 ]; then
              echo "Frontend verification failed after 5 attempts"
              exit 1
            fi

            sleep 5
          done

      - name: Post deployment summary
        run: |
          echo "## Frontend Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ✅ Success |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ env.IMAGE_NAME }}:sha-$(echo ${{ github.sha }} | cut -c1-7)\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| URL | https://app-sayel.onrender.com |" >> $GITHUB_STEP_SUMMARY
          echo "| Deployed by | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY


  # ════════════════════════════════════════════════════════════════════════════
  # JOB 4 — Rollback (manual trigger only)
  # ════════════════════════════════════════════════════════════════════════════
  rollback:
    name: Rollback to Previous Image
    runs-on: ubuntu-latest

    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.rollback_tag != ''

    environment:
      name: production-frontend
      url: https://app-sayel.onrender.com

    steps:
      - name: Validate rollback tag exists
        run: |
          ROLLBACK_TAG="${{ github.event.inputs.rollback_tag }}"
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            "https://hub.docker.com/v2/repositories/${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO_NAME_FRONTEND }}/tags/$ROLLBACK_TAG/")

          if [ "$STATUS" != "200" ]; then
            echo "ERROR: Tag '$ROLLBACK_TAG' not found on Docker Hub"
            exit 1
          fi

          echo "Tag confirmed: $ROLLBACK_TAG"
          echo "ROLLBACK_TAG=$ROLLBACK_TAG" >> $GITHUB_ENV

      - name: Re-tag rollback image as latest
        run: |
          docker pull $IMAGE_NAME:$ROLLBACK_TAG
          docker tag  $IMAGE_NAME:$ROLLBACK_TAG $IMAGE_NAME:latest
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login \
            -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          docker push $IMAGE_NAME:latest
          echo "Promoted $ROLLBACK_TAG → latest"

      - name: Trigger Render redeploy
        run: |
          curl -sf -X POST \
            "https://api.render.com/v1/services/${{ secrets.RENDER_FRONTEND_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}'

      - name: Post rollback summary
        run: |
          echo "## ⏪ Frontend Rollback Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Rolled back to | \`$ROLLBACK_TAG\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
